<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background font-body-md text-on-surface">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-900 font-manrope antialiased tracking-tight docked full-width top-0 sticky z-50 border-b border-slate-100 dark:border-slate-800 shadow-[0px_4px_20px_rgba(0,94,184,0.05)] flex justify-between items-center w-full px-6 h-16">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-slate-600 dark:text-slate-400 p-2 hover:bg-[#eff4fb] rounded-lg transition-colors">menu</button>
<span class="text-xl font-extrabold text-[#005eb8] dark:text-blue-400 tracking-tighter">ClinicOS</span>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-[#eff4fb]">
<img alt="Receptionist Profile Photo" class="w-full h-full object-cover" data-alt="close-up portrait of a professional healthcare receptionist smiling in a modern medical office setting with clinical lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuATan7446xEO236IV2zZL1XnmoF-xeXXEBsquCD5GtvtL4samx82w5erZjoa8bX83NkTXmyx8V_-QmXhpEx6ZZKWM1iOY-L7kVYx-3zkYleMixNLrtf0nB4KFLSyP8XIQLAw0H5noxHK6QtfGetzP0aFnGT2u4xu4WYuljf0cRYiyk9MMONZJFGXMnmMRzwu-IJWEcq-O-4rQO9PTacPh-ZhGXqyxN1YaY55cc1LWJof0KQFVSo5xOeLuh12b51UO1D8ZbG6D7IxQc"/>
</div>
</header>
<main class="min-h-[calc(100vh-144px)] flex items-center justify-center p-6 bg-surface-container-low">
<!-- Main Form Card -->
<div class="w-full max-w-[480px] bg-white rounded-xl shadow-[0px_4px_20px_rgba(0,94,184,0.05)] overflow-hidden border-l-4 border-primary">
<div class="p-8 md:p-10">
<div class="mb-10 text-center">
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Book an Appointment</h1>
<p class="font-body-md text-body-md text-secondary">Please provide your details to secure your clinical slot.</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-secondary uppercase tracking-widest" for="full_name">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-12 pr-4 py-3 bg-[#eff4fb] border-transparent focus:border-primary focus:ring-0 rounded-lg transition-all font-body-md placeholder:text-slate-400 text-on-surface" id="full_name" name="full_name" placeholder="Dr. Jane Doe" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-secondary uppercase tracking-widest" for="mobile_no">Mobile No.</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">call</span>
<input class="w-full pl-12 pr-4 py-3 bg-[#eff4fb] border-transparent focus:border-primary focus:ring-0 rounded-lg transition-all font-body-md placeholder:text-slate-400 text-on-surface" id="mobile_no" name="mobile_no" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="pt-4">
<button class="w-full flex items-center justify-center gap-3 bg-primary text-on-primary py-4 px-6 rounded-lg font-button-text text-button-text active:scale-95 transition-all duration-200 shadow-md hover:shadow-lg" type="submit">
                            Confirm &amp; Book Appointment
                            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
<div class="pt-6 text-center">
<a class="font-label-caps text-label-caps text-primary uppercase tracking-widest hover:underline decoration-2 underline-offset-4 transition-all" href="#">
                            Review Clinic Policies
                        </a>
</div>
</form>
</div>
<!-- Contextual Decorative Section -->
<div class="bg-surface-container h-24 flex items-center px-8">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-white flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
</div>
<div>
<p class="font-label-caps text-label-caps text-secondary">NEXT AVAILABLE</p>
<p class="font-button-text text-button-text text-on-surface">Today, 2:30 PM</p>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 shadow-[0px_-4px_20px_rgba(0,94,184,0.03)] flex justify-around items-center h-20 px-2 pb-safe">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-[#005eb8] dark:hover:text-blue-300 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-manrope text-[11px] font-semibold uppercase tracking-wider mt-1">Overview</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-[#005eb8] dark:hover:text-blue-300 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-manrope text-[11px] font-semibold uppercase tracking-wider mt-1">History</span>
</a>
<!-- Active Tab: Book Appt -->
<a class="flex flex-col items-center justify-center text-[#005eb8] dark:text-blue-300 bg-[#eff4fb] dark:bg-blue-900/20 rounded-xl px-4 py-2 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="add_box" style="font-variation-settings: 'FILL' 1;">add_box</span>
<span class="font-manrope text-[11px] font-semibold uppercase tracking-wider mt-1">Book Appt</span>
</a>
</nav>
<!-- Spacer for BottomNavBar -->
<div class="h-20"></div>
</body></html>
