<!DOCTYPE html>

                    "container-max": "1200px",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .clinic-input-shadow:focus-within {
            box-shadow: 0 0 0 2px #00478d;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col items-center">
<header class="w-full flex flex-col items-center pt-xl pb-md">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="medical_services">medical_services</span>
<h1 class="font-headline-xl text-primary tracking-tighter uppercase font-black">ClinicOS</h1>
</div>
</header>
<main class="w-full max-w-[480px] px-gutter pb-xl flex-grow flex flex-col justify-center">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,94,184,0.05)] border-l-4 border-primary p-md md:p-lg">
<div class="mb-md">
<h2 class="font-headline-md text-on-surface mb-xs">Welcome back</h2>
<p class="font-body-md text-on-surface-variant">Please enter your clinical credentials to continue.</p>
</div>
<form class="space-y-md">
<div class="space-y-xs">
<label class="font-label-caps text-on-surface-variant block">EMAIL ADDRESS</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full bg-[#eff4fb] border-none rounded-lg py-4 pl-12 pr-4 font-body-md focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none" placeholder="dr.smith@clinicos.com" type="email"/>
</div>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-on-surface-variant block">PASSWORD</label>
<a class="font-label-caps text-primary hover:underline" href="#">FORGOT PASSWORD?</a>
</div>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-[#eff4fb] border-none rounded-lg py-4 pl-12 pr-4 font-body-md focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center gap-2 py-xs">
<input class="w-5 h-5 rounded border-outline text-primary focus:ring-primary cursor-pointer" id="keep-logged" type="checkbox"/>
<label class="font-body-md text-on-surface-variant select-none cursor-pointer" for="keep-logged">Keep me logged in</label>
</div>
<button class="w-full bg-primary text-on-primary font-button-text py-4 px-6 rounded-lg flex items-center justify-center gap-2 hover:bg-primary-container transition-all active:scale-[0.98]" type="submit">
                    LOGIN TO DASHBOARD
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<div class="mt-md text-center">
<p class="font-body-md text-on-surface-variant">
                New to the platform? 
                <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Create Account</a>
</p>
</div>
</main>
<footer class="w-full py-12 px-6 mt-auto border-t border-slate-200 flex flex-col items-center gap-6 text-center">
<div class="flex flex-wrap justify-center gap-6">
<a class="font-label-caps text-slate-500 hover:text-primary transition-all" href="#">Privacy Policy</a>
<a class="font-label-caps text-slate-500 hover:text-primary transition-all" href="#">Terms of Service</a>
<a class="font-label-caps text-slate-500 hover:text-primary transition-all" href="#">Help Center</a>
</div>
<p class="font-label-caps text-slate-400">© 2024 HEALTHCARE SYSTEMS. SECURE CLINICAL PORTAL.</p>
</footer>
</body></html>
