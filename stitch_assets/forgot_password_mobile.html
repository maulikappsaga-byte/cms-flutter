<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .clinical-input:focus-within {
            background-color: #eff4fb;
            box-shadow: 0 0 0 2px #00478d;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar Section -->
<header class="bg-white dark:bg-slate-950 border-b border-slate-100 dark:border-slate-800 shadow-[0_4px_20px_rgba(0,94,184,0.05)] docked full-width top-0 z-50 flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400" data-icon="medical_services">medical_services</span>
<span class="font-manrope font-semibold tracking-tight text-xl font-black text-blue-700 dark:text-blue-400 tracking-tighter uppercase">HealthPortal</span>
</div>
</header>
<!-- Main Recovery Canvas -->
<main class="flex-grow flex items-center justify-center p-6 md:p-12">
<div class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,94,184,0.05)] border-l-4 border-primary p-8 md:p-12 transition-all duration-300">
<!-- Recovery Icon -->
<div class="flex justify-center mb-8">
<div class="w-16 h-16 bg-primary-fixed rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<!-- Content -->
<div class="text-center mb-10">
<h1 class="font-headline-xl text-headline-xl text-on-surface mb-xs">Password Recovery</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto">
                    Enter your email address and we'll send you a secure link
                </p>
</div>
<!-- Recovery Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-outline uppercase" for="email">Email Address</label>
<div class="relative flex items-center clinical-input bg-[#eff4fb] rounded-lg transition-all duration-200">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 focus:ring-0 text-on-surface font-body-md placeholder:text-outline-variant" id="email" name="email" placeholder="practitioner@clinic.os" type="email"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-button-text text-button-text py-4 px-6 rounded-lg flex items-center justify-center gap-2 hover:bg-primary-container active:scale-95 transition-all duration-200 shadow-md" type="submit">
                    SEND LINK
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Navigation Link -->
<div class="mt-12 text-center">
<a class="inline-flex items-center gap-2 font-label-caps text-label-caps text-primary hover:text-primary-container transition-colors tracking-widest uppercase" href="#">
<span class="material-symbols-outlined text-[16px]" data-icon="arrow_back">arrow_back</span>
                    Back to Login
                </a>
</div>
</div>
</main>
<!-- Footer Section -->
<footer class="bg-slate-50 dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 w-full py-12 px-6 mt-auto flex flex-col items-center gap-6 text-center">
<div class="flex flex-wrap justify-center gap-6">
<a class="font-manrope text-[11px] uppercase tracking-widest font-bold text-slate-500 hover:text-blue-800 transition-all" href="#">Privacy Policy</a>
<a class="font-manrope text-[11px] uppercase tracking-widest font-bold text-slate-500 hover:text-blue-800 transition-all" href="#">Terms of Service</a>
<a class="font-manrope text-[11px] uppercase tracking-widest font-bold text-slate-500 hover:text-blue-800 transition-all" href="#">Help Center</a>
</div>
<p class="font-manrope text-[11px] uppercase tracking-widest font-bold text-slate-400">
            © 2024 Healthcare Systems. Secure Clinical Portal.
        </p>
</footer>
<!-- Abstract Background Element (Sanctuary of Data feel) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[20%] -right-[10%] w-[600px] h-[600px] bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-[10%] -left-[5%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-3xl"></div>
</div>
</body></html>
